name: Codex 5.5 Daily Ping

on:
  schedule:
    # 7:00 AM GMT+7 = 0:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Ping Codex
        env:
          SESSION_TOKEN_0: ${{ secrets.SESSION_TOKEN_0 }}
          SESSION_TOKEN_1: ${{ secrets.SESSION_TOKEN_1 }}
        run: node ping.js
