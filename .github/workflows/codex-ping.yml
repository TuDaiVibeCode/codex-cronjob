name: Codex 5.5 Daily Ping

on:
  schedule:
    # 5:13 AM GMT+7 = 22:13 UTC
    - cron: "13 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Bangkok
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Ping Codex
        id: ping
        env:
          SESSION_TOKEN_0: ${{ secrets.SESSION_TOKEN_0 }}
          SESSION_TOKEN_1: ${{ secrets.SESSION_TOKEN_1 }}
        run: |
          set +e
          node ping.js
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "75" ]; then
            exit 0
          fi
          exit "$code"

      - name: Report quota limit
        if: steps.ping.outputs.exit_code == '75'
        run: |
          if [ -s logs/retry-at.txt ]; then
            echo "Codex quota reached. Reset time: $(cat logs/retry-at.txt)"
          else
            echo "Codex quota reached. Reset time could not be parsed."
          fi
          echo "The workflow will try again at the next daily run."

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots
          path: |
            logs/*.png
            logs/*.txt
            logs/*.log
          if-no-files-found: ignore
